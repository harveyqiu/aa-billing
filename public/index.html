<!DOCTYPE html>
  <html lang="zh-CN">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests;">
      <title>聚会AA分钱计算器</title>
      <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
      <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
      <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
      <script src="https://cdn.tailwindcss.com"></script>
      <style>
          body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', sans-serif; }
      </style>
  </head>
  <body>
      <div id="root"></div>
      
      <script type="text/babel">
          const { useState, useEffect, useMemo } = React;

          const DEFAULT_PEOPLE = ['小明', '小红', '小刚'];
          const isPlainObject = (value) => Object.prototype.toString.call(value) === '[object Object]';
          const sanitizeString = (value) => typeof value === 'string' ? value : '';
          const sanitizePeople = (people) => Array.isArray(people)
              ? [...new Set(people.filter((p) => typeof p === 'string').map((p) => p.trim()).filter(Boolean))]
              : DEFAULT_PEOPLE;
          const sanitizeAmountMap = (amounts, people) => {
              const source = isPlainObject(amounts) ? amounts : {};
              return people.reduce((acc, person) => {
                  acc[person] = sanitizeString(source[person]);
                  return acc;
              }, {});
          };
          const sanitizeSharesMap = (shares, people) => {
              const source = isPlainObject(shares) ? shares : {};
              return people.reduce((acc, person) => {
                  acc[person] = sanitizeShares(source[person]);
                  return acc;
              }, {});
          };
          const sanitizeShares = (value) => {
              const n = Number.parseInt(value, 10);
              return Number.isFinite(n) ? Math.min(999, Math.max(1, n)) : 1;
          };
          const sanitizeLoadedData = (data) => {
              if (!isPlainObject(data)) return null;
              const people = sanitizePeople(data.people);
              return {
                  people,
                  sharedExpenses: Array.isArray(data.sharedExpenses) ? data.sharedExpenses.map((exp) => ({
                      description: sanitizeString(exp && exp.description),
                      amount: sanitizeString(exp && exp.amount),
                      shares: sanitizeSharesMap(exp && exp.shares, people),
                  })) : [],
                  partialExpenses: Array.isArray(data.partialExpenses) ? data.partialExpenses.map((exp) => ({
                      description: sanitizeString(exp && exp.description),
                      amount: sanitizeString(exp && exp.amount),
                      participants: Array.isArray(exp && exp.participants)
                          ? exp.participants.filter((p) => p && people.includes(p.name)).map((p) => ({ name: p.name, shares: sanitizeShares(p.shares) }))
                          : [],
                  })) : [],
                  individualExpenses: Array.isArray(data.individualExpenses) ? data.individualExpenses
                      .filter((exp) => exp && people.includes(exp.person))
                      .map((exp) => ({ person: exp.person, description: sanitizeString(exp.description), amount: sanitizeString(exp.amount) })) : [],
                  manualExpenses: Array.isArray(data.manualExpenses) ? data.manualExpenses.map((exp) => ({
                      description: sanitizeString(exp && exp.description),
                      amounts: sanitizeAmountMap(exp && exp.amounts, people),
                  })) : [],
                  discountEnabled: !!data.discountEnabled,
                  discountType: data.discountType === 'amount' ? 'amount' : 'percent',
                  discountValue: sanitizeString(data.discountValue),
                  payerName: people.includes(data.payerName) ? data.payerName : '',
              };
          };

          const STORAGE_KEY = 'aa-billing-data';

          const loadFromStorage = () => {
              try {
                  const saved = localStorage.getItem(STORAGE_KEY);
                  if (saved) return sanitizeLoadedData(JSON.parse(saved));
              } catch (e) {
                  console.error('[aa-billing] 读取本地存储失败:', e);
              }
              return null;
          };

          const saveToStorage = (data) => {
              try {
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                  return true;
              } catch (e) {
                  console.error('[aa-billing] 保存到本地存储失败:', e);
                  return false;
              }
          };
          
          // 金额在输入过程中以字符串保存（保证输入框为空时能显示提示、可正常输入小数），参与计算时再转为数字
          const toAmount = (value) => {
              const n = Number(value);
              return Number.isFinite(n) && n > 0 ? n : 0;
          };

          // Lucide React图标组件（简化版）
          const PlusIcon = () => (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
          );
          
          const MinusIcon = () => (
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
          );
          
          const CalculatorIcon = () => (
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="4" y="2" width="16" height="20" rx="2"></rect>
                  <line x1="8" y1="6" x2="16" y2="6"></line>
                  <line x1="16" y1="10" x2="8" y2="10"></line>
                  <line x1="8" y1="14" x2="12" y2="14"></line>
                  <line x1="8" y1="18" x2="12" y2="18"></line>
                  <circle cx="16" cy="16" r="2"></circle>
              </svg>
          );
          
          const UsersIcon = () => (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
          );
          
          const ReceiptIcon = () => (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"></path>
                  <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path>
                  <path d="M12 18V6"></path>
              </svg>
          );
          
          const UserCheckIcon = () => (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <polyline points="16,11 18,13 22,9"></polyline>
              </svg>
          );

          const TagIcon = () => (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <path d="M12 2H2v10l9.29 9.29a1 1 0 0 0 1.42 0l8.58-8.58a1 1 0 0 0 0-1.42L12 2Z"></path>
                  <circle cx="7" cy="7" r="1.5" fill="currentColor" stroke="none"></circle>
              </svg>
          );

          const ShareIcon = () => (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <circle cx="18" cy="5" r="3"></circle>
                  <circle cx="6" cy="12" r="3"></circle>
                  <circle cx="18" cy="19" r="3"></circle>
                  <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                  <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
              </svg>
          );
  
          function AABillCalculator() {
              const saved = useMemo(loadFromStorage, []);
              const [storageError, setStorageError] = useState(false);
              const [people, setPeople] = useState(saved ? saved.people : DEFAULT_PEOPLE);
              const [newPersonName, setNewPersonName] = useState('');
              const [sharedExpenses, setSharedExpenses] = useState(saved ? saved.sharedExpenses : []);
              const [partialExpenses, setPartialExpenses] = useState(saved ? saved.partialExpenses : []);
              const [individualExpenses, setIndividualExpenses] = useState(saved ? saved.individualExpenses : []);
              const [manualExpenses, setManualExpenses] = useState(saved ? saved.manualExpenses : []);
              // 整体折扣：最后支付账单时的整体优惠，会按每人应付金额的比例分摊到每个人身上
              const [discountEnabled, setDiscountEnabled] = useState(saved ? !!saved.discountEnabled : false);
              const [discountType, setDiscountType] = useState(saved && saved.discountType ? saved.discountType : 'percent'); // 'percent' | 'amount'
              const [discountValue, setDiscountValue] = useState(saved && saved.discountValue !== undefined ? saved.discountValue : '');
              // 收款人：账单的代付人，其他人分账后把各自金额转给这个人
              const [payerName, setPayerName] = useState(saved && saved.payerName ? saved.payerName : '');
              const [shareCopied, setShareCopied] = useState(false);

              useEffect(() => {
                  const ok = saveToStorage({ people, sharedExpenses, partialExpenses, individualExpenses, manualExpenses, discountEnabled, discountType, discountValue, payerName });
                  if (!ok) setStorageError(true);
                  else setStorageError(false);
              }, [people, sharedExpenses, partialExpenses, individualExpenses, manualExpenses, discountEnabled, discountType, discountValue, payerName]);

              const clearAllBills = () => {
                  if (window.confirm('确定要清除所有账单吗？此操作不可撤销。')) {
                      setSharedExpenses([]);
                      setPartialExpenses([]);
                      setIndividualExpenses([]);
                      setManualExpenses([]);
                      setDiscountEnabled(false);
                      setDiscountType('percent');
                      setDiscountValue('');
                      setPayerName('');
                  }
              };
  
              // 添加参与者
              const addPerson = () => {
                  if (newPersonName.trim() && !people.includes(newPersonName.trim())) {
                      const name = newPersonName.trim();
                      setPeople([...people, name]);
                      setSharedExpenses(sharedExpenses.map(exp => ({
                          ...exp,
                          shares: {...exp.shares, [name]: 1}
                      })));
                      setManualExpenses(manualExpenses.map(exp => ({
                          ...exp,
                          amounts: {...exp.amounts, [name]: ''}
                      })));
                      setNewPersonName('');
                  }
              };
  
              // 删除参与者
              const removePerson = (name) => {
                  setPeople(people.filter(p => p !== name));
                  setIndividualExpenses(individualExpenses.filter(exp => exp.person !== name));
                  setSharedExpenses(sharedExpenses.map(exp => {
                      const newShares = {...exp.shares};
                      delete newShares[name];
                      return {...exp, shares: newShares};
                  }));
                  setPartialExpenses(partialExpenses.map(exp => ({
                      ...exp,
                      participants: exp.participants.filter(p => p.name !== name)
                  })));
                  setManualExpenses(manualExpenses.map(exp => {
                      const newAmounts = {...exp.amounts};
                      delete newAmounts[name];
                      return {...exp, amounts: newAmounts};
                  }));
              };
  
              // 添加全员共同费用
              const addSharedExpense = () => {
                  const shares = {};
                  people.forEach(p => { shares[p] = 1; });
                  setSharedExpenses([...sharedExpenses, { description: '', amount: '', shares }]);
              };
  
              // 更新全员共同费用
              const updateSharedExpense = (index, field, value) => {
                  setSharedExpenses(sharedExpenses.map((exp, i) => i === index ? {...exp, [field]: value} : exp));
              };
  
              // 删除全员共同费用
              const removeSharedExpense = (index) => {
                  setSharedExpenses(sharedExpenses.filter((_, i) => i !== index));
              };

              // 更新全员共同费用中某人的份数
              const updateSharedExpenseShares = (expenseIndex, personName, shares) => {
                  setSharedExpenses(sharedExpenses.map((exp, i) => i === expenseIndex ? {
                      ...exp,
                      shares: {...exp.shares, [personName]: sanitizeShares(shares)}
                  } : exp));
              };

              // 添加部分参与者费用
              const addPartialExpense = () => {
                  setPartialExpenses([...partialExpenses, {
                      description: '',
                      amount: '',
                      participants: [{name: people[0], shares: 1}]
                  }]);
              };
  
              // 更新部分参与者费用
              const updatePartialExpense = (index, field, value) => {
                  setPartialExpenses(partialExpenses.map((exp, i) => i === index ? {...exp, [field]: value} : exp));
              };
  
              // 切换部分参与者费用的参与者
              const togglePartialParticipant = (expenseIndex, personName) => {
                  setPartialExpenses(partialExpenses.map((exp, i) => {
                      if (i !== expenseIndex) return exp;
                      const existing = exp.participants.find(p => p.name === personName);
                      return {
                          ...exp,
                          participants: existing
                              ? exp.participants.filter(p => p.name !== personName)
                              : [...exp.participants, {name: personName, shares: 1}]
                      };
                  }));
              };

              // 更新部分参与者的份数
              const updatePartialParticipantShares = (expenseIndex, personName, shares) => {
                  setPartialExpenses(partialExpenses.map((exp, i) => i === expenseIndex ? {
                      ...exp,
                      participants: exp.participants.map((p) => p.name === personName ? {...p, shares: sanitizeShares(shares)} : p)
                  } : exp));
              };
  
              // 删除部分参与者费用
              const removePartialExpense = (index) => {
                  setPartialExpenses(partialExpenses.filter((_, i) => i !== index));
              };
  
              // 添加个人费用
              const addIndividualExpense = () => {
                  setIndividualExpenses([...individualExpenses, { person: people[0], description: '', amount: '' }]);
              };
  
              // 更新个人费用
              const updateIndividualExpense = (index, field, value) => {
                  setIndividualExpenses(individualExpenses.map((exp, i) => i === index ? {...exp, [field]: value} : exp));
              };
  
              // 删除个人费用
              const removeIndividualExpense = (index) => {
                  setIndividualExpenses(individualExpenses.filter((_, i) => i !== index));
              };

              // 添加手动分配费用
              const addManualExpense = () => {
                  const amounts = {};
                  people.forEach(p => { amounts[p] = ''; });
                  setManualExpenses([...manualExpenses, {description: '', amounts}]);
              };

              // 更新手动分配费用描述
              const updateManualExpenseDescription = (index, value) => {
                  setManualExpenses(manualExpenses.map((exp, i) => i === index ? {...exp, description: value} : exp));
              };

              // 更新手动分配费用中某人的金额
              const updateManualExpenseAmount = (index, personName, value) => {
                  setManualExpenses(manualExpenses.map((exp, i) => i === index ? {
                      ...exp,
                      amounts: {...exp.amounts, [personName]: value}
                  } : exp));
              };

              // 删除手动分配费用
              const removeManualExpense = (index) => {
                  setManualExpenses(manualExpenses.filter((_, i) => i !== index));
              };

              // 计算结果（useMemo 缓存，依赖项不变时不重复计算）
              const results = useMemo(() => {
                  return people.map(person => {
                      const sharedAmount = sharedExpenses.reduce((sum, exp) => {
                          const totalShares = Object.values(exp.shares || {}).reduce((s, v) => s + v, 0);
                          const personShares = (exp.shares || {})[person] || 1;
                          const denom = totalShares > 0 ? totalShares : people.length;
                          return sum + (toAmount(exp.amount) * personShares / denom);
                      }, 0);

                      const partialAmount = partialExpenses.reduce((sum, exp) => {
                          const totalShares = exp.participants.reduce((s, p) => s + p.shares, 0);
                          const personEntry = exp.participants.find(p => p.name === person);
                          if (personEntry && totalShares > 0) {
                              return sum + (toAmount(exp.amount) * personEntry.shares / totalShares);
                          }
                          return sum;
                      }, 0);

                      const individualAmount = individualExpenses
                          .filter(exp => exp.person === person)
                          .reduce((sum, exp) => sum + toAmount(exp.amount), 0);

                      const manualAmount = manualExpenses.reduce((sum, exp) => {
                          return sum + toAmount(exp.amounts[person]);
                      }, 0);

                      return {
                          name: person,
                          sharedAmount,
                          partialAmount,
                          individualAmount,
                          manualAmount,
                          totalAmount: sharedAmount + partialAmount + individualAmount + manualAmount
                      };
                  });
              }, [people, sharedExpenses, partialExpenses, individualExpenses, manualExpenses]);

              const totalAmount = useMemo(
                  () => results.reduce((sum, person) => sum + person.totalAmount, 0),
                  [results]
              );

              // 整体折扣金额（不超过总金额，不小于0）
              const discountAmount = useMemo(() => {
                  if (!discountEnabled || totalAmount <= 0) return 0;
                  const raw = discountType === 'percent'
                      ? totalAmount * (Math.min(100, Math.max(0, toAmount(discountValue))) / 100)
                      : Math.max(0, toAmount(discountValue));
                  return Math.min(raw, totalAmount);
              }, [discountEnabled, discountType, discountValue, totalAmount]);

              const finalTotalAmount = totalAmount - discountAmount;

              // 将折扣按每人应付金额占比分摊到每个人身上
              const discountedResults = useMemo(() => {
                  return results.map(person => {
                      const personDiscount = totalAmount > 0 ? (person.totalAmount / totalAmount) * discountAmount : 0;
                      return {
                          ...person,
                          discountAmount: personDiscount,
                          finalAmount: person.totalAmount - personDiscount
                      };
                  });
              }, [results, totalAmount, discountAmount]);

              // 收款人（代付人）：用于生成分享内容，其他人需要把钱转给这个人
              const effectivePayer = people.includes(payerName) ? payerName : (people[0] || '');

              // 需要转账给收款人的明细（不含收款人自己）
              const transfers = useMemo(
                  () => discountedResults.filter(p => p.name !== effectivePayer),
                  [discountedResults, effectivePayer]
              );
              const transfersTotal = useMemo(
                  () => transfers.reduce((sum, p) => sum + p.finalAmount, 0),
                  [transfers]
              );

              // 生成可复制的分享文本
              const shareText = useMemo(() => {
                  if (people.length === 0) return '';
                  const lines = ['🧾 聚会AA分账结果', ''];
                  discountedResults.forEach(p => {
                      lines.push(`${p.name}：¥${p.finalAmount.toFixed(2)}`);
                  });
                  if (discountEnabled && discountAmount > 0) {
                      lines.push('', `（已优惠 ¥${discountAmount.toFixed(2)}，实收合计 ¥${finalTotalAmount.toFixed(2)}）`);
                  }
                  if (effectivePayer && transfers.length > 0) {
                      lines.push('', `💰 请转账给 ${effectivePayer}：`);
                      transfers.forEach(p => {
                          lines.push(`· ${p.name}：¥${p.finalAmount.toFixed(2)}`);
                      });
                      lines.push(`合计：¥${transfersTotal.toFixed(2)}`);
                  }
                  return lines.join('\n');
              }, [people, discountedResults, discountEnabled, discountAmount, finalTotalAmount, effectivePayer, transfers, transfersTotal]);

              // 复制分享文本到剪贴板
              const copyShareText = async () => {
                  try {
                      if (navigator.clipboard && navigator.clipboard.writeText) {
                          await navigator.clipboard.writeText(shareText);
                      } else {
                          const textarea = document.createElement('textarea');
                          textarea.value = shareText;
                          textarea.style.position = 'fixed';
                          textarea.style.opacity = '0';
                          document.body.appendChild(textarea);
                          textarea.select();
                          document.execCommand('copy');
                          document.body.removeChild(textarea);
                      }
                      setShareCopied(true);
                      setTimeout(() => setShareCopied(false), 2000);
                  } catch (e) {
                      console.error('[aa-billing] 复制到剪贴板失败:', e);
                      window.alert('复制失败，请手动选择文本复制');
                  }
              };

              // 生成分享图片并下载
              const downloadShareImage = () => {
                  const rowHeight = 36;
                  const width = 640;
                  const padding = 32;
                  let y = padding;

                  const headerHeight = 90;
                  const summaryRows = discountedResults.length;
                  const discountNoteHeight = (discountEnabled && discountAmount > 0) ? 30 : 0;
                  const transferHeaderHeight = (effectivePayer && transfers.length > 0) ? 44 : 0;
                  const transferRows = transfers.length;
                  const transferTotalHeight = (effectivePayer && transfers.length > 0) ? 40 : 0;
                  const footerHeight = 50;

                  const height = headerHeight
                      + summaryRows * rowHeight
                      + discountNoteHeight
                      + transferHeaderHeight
                      + transferRows * rowHeight
                      + transferTotalHeight
                      + footerHeight
                      + padding;

                  const scale = 2;
                  const canvas = document.createElement('canvas');
                  canvas.width = width * scale;
                  canvas.height = height * scale;
                  const ctx = canvas.getContext('2d');
                  ctx.scale(scale, scale);

                  // 背景
                  ctx.fillStyle = '#ffffff';
                  ctx.fillRect(0, 0, width, height);

                  // 标题
                  ctx.fillStyle = '#1e3a8a';
                  ctx.font = 'bold 24px sans-serif';
                  ctx.fillText('🧾 聚会AA分账结果', padding, y + 24);
                  ctx.fillStyle = '#6b7280';
                  ctx.font = '13px sans-serif';
                  const dateStr = new Date().toLocaleDateString('zh-CN');
                  ctx.fillText(dateStr, padding, y + 48);
                  y += headerHeight;

                  // 每人应付
                  ctx.font = '16px sans-serif';
                  discountedResults.forEach(p => {
                      ctx.strokeStyle = '#e5e7eb';
                      ctx.beginPath();
                      ctx.moveTo(padding, y + rowHeight - 10);
                      ctx.lineTo(width - padding, y + rowHeight - 10);
                      ctx.stroke();

                      ctx.fillStyle = '#374151';
                      ctx.fillText(p.name, padding, y + 14);
                      ctx.fillStyle = '#111827';
                      ctx.font = 'bold 16px monospace';
                      const amountText = `¥${p.finalAmount.toFixed(2)}`;
                      const amountWidth = ctx.measureText(amountText).width;
                      ctx.fillText(amountText, width - padding - amountWidth, y + 14);
                      ctx.font = '16px sans-serif';
                      y += rowHeight;
                  });

                  if (discountEnabled && discountAmount > 0) {
                      ctx.fillStyle = '#db2777';
                      ctx.font = '13px sans-serif';
                      ctx.fillText(`已优惠 ¥${discountAmount.toFixed(2)}，实收合计 ¥${finalTotalAmount.toFixed(2)}`, padding, y + 10);
                      y += discountNoteHeight;
                  }

                  if (effectivePayer && transfers.length > 0) {
                      ctx.fillStyle = '#065f46';
                      ctx.font = 'bold 16px sans-serif';
                      ctx.fillText(`💰 请转账给 ${effectivePayer}`, padding, y + 20);
                      y += transferHeaderHeight;

                      ctx.font = '15px sans-serif';
                      transfers.forEach(p => {
                          ctx.fillStyle = '#374151';
                          ctx.fillText(`· ${p.name}`, padding, y + 14);
                          ctx.fillStyle = '#059669';
                          ctx.font = 'bold 15px monospace';
                          const amountText = `¥${p.finalAmount.toFixed(2)}`;
                          const amountWidth = ctx.measureText(amountText).width;
                          ctx.fillText(amountText, width - padding - amountWidth, y + 14);
                          ctx.font = '15px sans-serif';
                          y += rowHeight;
                      });

                      ctx.strokeStyle = '#d1d5db';
                      ctx.beginPath();
                      ctx.moveTo(padding, y);
                      ctx.lineTo(width - padding, y);
                      ctx.stroke();

                      ctx.fillStyle = '#065f46';
                      ctx.font = 'bold 16px sans-serif';
                      ctx.fillText('合计', padding, y + 26);

                                                  </div>
                                                  <div className="flex justify-between font-semibold text-blue-600 border-t pt-1">
                                                      <span>应付总额：</span>
                                                      <span className="font-mono">¥{person.totalAmount.toFixed(2)}</span>
                                                  </div>
                                                  {discountEnabled && discountAmount > 0 && (
                                                      <React.Fragment>
                                                          <div className="flex justify-between text-pink-600">
                                                              <span>整体折扣：</span>
                                                              <span className="font-mono">-¥{person.discountAmount.toFixed(2)}</span>
                                                          </div>
                                                          <div className="flex justify-between font-semibold text-green-700 border-t pt-1">
                                                              <span>实付金额：</span>
                                                              <span className="font-mono">¥{person.finalAmount.toFixed(2)}</span>
                                                          </div>
                                                      </React.Fragment>
                                                  )}
                                              </div>
                                          </div>
                                      ))}
                                  </div>

                                  <div className="mt-6 p-4 bg-green-100 rounded-lg space-y-1">
                                      <div className="flex justify-between items-center">
                                          <span className="text-green-800 font-semibold">总费用：</span>
                                          <span className={`text-green-800 font-bold text-lg font-mono ${discountEnabled && discountAmount > 0 ? 'line-through opacity-60' : ''}`}>¥{totalAmount.toFixed(2)}</span>
                                      </div>
                                      {discountEnabled && discountAmount > 0 && (
                                          <React.Fragment>
                                              <div className="flex justify-between items-center text-pink-700">
                                                  <span className="font-semibold">整体折扣：</span>
                                                  <span className="font-bold font-mono">-¥{discountAmount.toFixed(2)}</span>
                                              </div>
                                              <div className="flex justify-between items-center">
                                                  <span className="text-green-800 font-semibold">实收总额：</span>
                                                  <span className="text-green-800 font-bold text-lg font-mono">¥{finalTotalAmount.toFixed(2)}</span>
                                              </div>
                                          </React.Fragment>
                                      )}
                                  </div>
                              </div>
  
                              {/* 费用明细 */}
                              <div className="bg-gray-50 p-4 sm:p-6 rounded-lg">
                                  <h2 className="text-xl font-semibold mb-4 text-gray-800">费用明细</h2>
                                  
                                  {sharedExpenses.length > 0 && (
                                      <div className="mb-4">
                                          <h3 className="font-semibold text-purple-600 mb-2">全员共同费用</h3>
                                          <div className="space-y-2">
                                              {sharedExpenses.map((expense, index) => {
                                                  const totalShares = Object.values(expense.shares || {}).reduce((s, v) => s + v, 0);
                                                  const isWeighted = people.some(p => (expense.shares || {})[p] !== 1);
                                                  return (
                                                      <div key={index} className="text-sm">
                                                          <div className="flex justify-between">
                                                              <span className="min-w-0 truncate mr-2">{expense.description || '未命名费用'}</span>
                                                              <span className="font-mono shrink-0">¥{toAmount(expense.amount).toFixed(2)}</span>
                                                          </div>
                                                          {isWeighted && totalShares > 0 && (
                                                              <div className="text-xs text-gray-500 ml-2 break-all">
                                                                  {people.map(p => p + '×' + ((expense.shares || {})[p] || 1) + '份').join('  ')}
                                                              </div>
                                                          )}
                                                      </div>
                                                  );
                                              })}
                                          </div>
                                      </div>
                                  )}
  
                                  {partialExpenses.length > 0 && (
                                      <div className="mb-4">
                                          <h3 className="font-semibold text-indigo-600 mb-2">部分参与者费用</h3>
                                          <div className="space-y-2">
                                              {partialExpenses.map((expense, index) => (
                                                  <div key={index} className="text-sm">
                                                      <div className="flex justify-between">
                                                          <span className="min-w-0 truncate mr-2">{expense.description || '未命名费用'}</span>
                                                          <span className="font-mono shrink-0">¥{toAmount(expense.amount).toFixed(2)}</span>
                                                      </div>
                                                      <div className="text-xs text-gray-500 ml-2 break-all">
                                                          参与者: {expense.participants.map(p => p.shares > 1 ? `${p.name}×${p.shares}份` : p.name).join(', ')}
                                                      </div>
                                                  </div>
                                              ))}
                                          </div>
                                      </div>
                                  )}
  
                                  {individualExpenses.length > 0 && (
                                      <div>
                                          <h3 className="font-semibold text-orange-600 mb-2">个人费用</h3>
                                          <div className="space-y-2">
                                              {individualExpenses.map((expense, index) => (
                                                  <div key={index} className="flex justify-between text-sm">
                                                      <span className="min-w-0 truncate mr-2">{expense.person} - {expense.description || '未命名费用'}</span>
                                                      <span className="font-mono shrink-0">¥{toAmount(expense.amount).toFixed(2)}</span>
                                                  </div>
                                              ))}
                                          </div>
                                      </div>
                                  )}

                                  {manualExpenses.length > 0 && (
                                      <div className="mt-4">
                                          <h3 className="font-semibold text-teal-600 mb-2">手动分配费用</h3>
                                          <div className="space-y-2">
                                              {manualExpenses.map((expense, index) => {
                                                  const total = Object.values(expense.amounts).reduce((s, v) => s + toAmount(v), 0);
                                                  return (
                                                      <div key={index} className="text-sm">
                                                          <div className="flex justify-between">
                                                              <span className="min-w-0 truncate mr-2">{expense.description || '未命名费用'}</span>
                                                              <span className="font-mono shrink-0">¥{total.toFixed(2)}</span>
                                                          </div>
                                                          <div className="text-xs text-gray-500 ml-2 break-all">
                                                              {Object.entries(expense.amounts)
                                                                  .filter(([, v]) => toAmount(v) > 0)
                                                                  .map(([name, v]) => `${name}: ¥${toAmount(v).toFixed(2)}`)
                                                                  .join('  ')}
                                                          </div>
                                                      </div>
                                                  );
                                              })}
                                          </div>
                                      </div>
                                  )}
                              </div>
                          </div>
                      </div>
                  </div>
              );
          }
  
          // 渲染应用
          const root = ReactDOM.createRoot(document.getElementById('root'));
          root.render(<AABillCalculator />);
      </script>
  </body>
  </html>
